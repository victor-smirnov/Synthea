# Synthea MCP (embedded Dolt) — HTTP transport for Cursor / external clients.
#
# Usage:
#   docker compose up -d --build
# Optional env overrides (copy env.docker.example -> env.docker):
#   docker compose --env-file env.docker up -d --build
# Cursor MCP URL: http://127.0.0.1:8787/mcp

services:
  synthea-mcp:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
      args:
        # Pin Dolt release used for the go.mod replace (see mcp-server/Dockerfile)
        DOLT_REF: ${DOLT_REF:-v1.84.0}
    image: synthea-mcp:local
    container_name: synthea-mcp
    ports:
      - "${SYNTHEA_MCP_PUBLISH:-127.0.0.1:8787}:8787"
    environment:
      SYNTHEA_MCP_TRANSPORT: http
      SYNTHEA_MCP_HTTP_ADDR: ":8787"
      SYNTHEA_MCP_DATA: /data
    volumes:
      - synthea_mcp_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s

volumes:
  synthea_mcp_data:
    name: synthea_mcp_data
